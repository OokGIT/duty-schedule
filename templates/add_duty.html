{% extends "base.html" %}
{% load static %}

{% block title %}Додати чергування{% endblock %}

{% block content %}
<div class="page-header">
    <h2>➕ Додати нове чергування</h2>
</div>

<div class="form-container">
    <form method="POST" action="{% url 'add_duty' %}" class="duty-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="employee_id">Працівник *</label>
            <select name="employee_id" id="employee_id" required>
                <option value="">Оберіть працівника</option>
                {% for employee in employees %}
                <option value="{{ employee.id }}">{{ employee.name }} - {{ employee.position }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="site_id">Об'єкт *</label>
            <select name="site_id" id="site_id" required>
                <option value="">Оберіть об'єкт</option>
                {% for site in sites %}
                <option value="{{ site.id }}">{{ site.name }} ({{ site.address }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="start_date">Дата початку *</label>
                <input type="date" name="start_date" id="start_date" required>
            </div>

            <div class="form-group">
                <label for="end_date">Дата закінчення *</label>
                <input type="date" name="end_date" id="end_date" required>
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Примітки</label>
            <textarea name="notes" id="notes" rows="4" placeholder="Додаткова інформація про чергування..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✅ Зберегти</button>
            <a href="{% url 'index' %}" class="btn btn-secondary">❌ Скасувати</a>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% load static %}

{% block title %}Додати об'єкт{% endblock %}

{% block content %}
<div class="page-header">
    <h2>➕ Додати новий об'єкт</h2>
</div>

<div class="form-container">
    <form method="POST" action="{% url 'add_site' %}" class="duty-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Назва об'єкта *</label>
            <input type="text" name="name" id="name" required placeholder="Наприклад: Склад №1" value="{{ form.name.value|default:'' }}">
        </div>

        <div class="form-group">
            <label for="short_name">Скорочена назва</label>
            <input type="text" name="short_name" id="short_name" placeholder="Наприклад: Склад1" value="{{ form.short_name.value|default:'' }}">
        </div>

        <div class="form-group">
            <label for="address">Адреса</label>
            <input type="text" name="address" id="address" placeholder="Наприклад: вул. Промислова, 15" value="{{ form.address.value|default:'' }}">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="display_mode">Відображення в календарі</label>
                <select name="display_mode" id="display_mode" class="form-control">
                    <option value="symbol" selected>Символ</option>
                    <option value="color">Кольором</option>
                </select>
            </div>

            <div class="form-group">
                <label for="color">Колір</label>
                <input type="color" name="color" id="color" value="#4f46e5" style="width: 100%; height: 40px;">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✅ Зберегти</button>
            <a href="{% url 'sites' %}" class="btn btn-secondary">❌ Скасувати</a>
        </div>
    </form>
</div>
{% endblock %}

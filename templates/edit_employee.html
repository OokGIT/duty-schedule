{% extends "base.html" %}
{% load static %}

{% block title %}Редагувати працівника{% endblock %}

{% block content %}
<div class="page-header">
    <h2>✏️ Редагувати працівника</h2>
</div>

<div class="form-container">
    <form method="POST" action="{% url 'edit_employee' employee.id %}" class="duty-form">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label for="last_name">Прізвище *</label>
                <input type="text" name="last_name" id="last_name" required value="{{ employee.last_name }}">
            </div>

            <div class="form-group">
                <label for="first_name">Ім'я *</label>
                <input type="text" name="first_name" id="first_name" required value="{{ employee.first_name }}">
            </div>

            <div class="form-group">
                <label for="patronymic">По-батькові</label>
                <input type="text" name="patronymic" id="patronymic" value="{{ employee.patronymic }}">
            </div>
        </div>

        <div class="form-group">
            <label for="position">Посада</label>
            <input type="text" name="position" id="position" value="{{ employee.position }}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✅ Зберегти</button>
            <a href="{% url 'employees' %}" class="btn btn-secondary">❌ Скасувати</a>
        </div>
    </form>
</div>
{% endblock %}

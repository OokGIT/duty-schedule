{% extends "base.html" %}
{% load static %}

{% block title %}Додати працівника{% endblock %}

{% block content %}
<div class="page-header">
    <h2>➕ Додати нового працівника</h2>
</div>

<div class="form-container">
    <form method="POST" action="{% url 'add_employee' %}" class="duty-form">
        {% csrf_token %}
        <div class="form-row">
            <div class="form-group">
                <label for="last_name">Прізвище *</label>
                <input type="text" name="last_name" id="last_name" required placeholder="Наприклад: Петренко" value="{{ form.last_name.value|default:'' }}">
            </div>

            <div class="form-group">
                <label for="first_name">Ім'я *</label>
                <input type="text" name="first_name" id="first_name" required placeholder="Наприклад: Іван" value="{{ form.first_name.value|default:'' }}">
            </div>

            <div class="form-group">
                <label for="patronymic">По-батькові</label>
                <input type="text" name="patronymic" id="patronymic" placeholder="Наприклад: Іванович" value="{{ form.patronymic.value|default:'' }}">
            </div>
        </div>

        <div class="form-group">
            <label for="position">Посада</label>
            <input type="text" name="position" id="position" placeholder="Наприклад: Охоронець" value="{{ form.position.value|default:'' }}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">✅ Зберегти</button>
            <a href="{% url 'employees' %}" class="btn btn-secondary">❌ Скасувати</a>
        </div>
    </form>
</div>
{% endblock %}
